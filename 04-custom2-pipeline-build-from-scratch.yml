# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger:
- main

variables:
  tag: '$(Build.BuildId)'

stages:
  - stage: build
    displayName: Build stage
    jobs:
    - job: Build
      displayName: Build Job
      pool: 
        vmImage: 'ubuntu-latest'
      steps:
        - task: Docker@2
          inputs:
            containerRegistry: 'manual-aksdevopsacr-svc'
            repository: 'ayemeazuredevopsgithubacraksapp'
            command: 'buildAndPush'
            Dockerfile: '**/Dockerfile'
            tags: |
              $(tag)
              $(Build.SourceVersion)  
        - task: Bash@3
          inputs:
            targetType: 'inline'
            script: |
              # Write your commands here
              
              echo Contents in System Default Working Directory; ls -R $(System.DefaultWorkingDirectory)
        
        - task: Bash@3
          inputs:
            targetType: 'inline'
            script: |
              # Write your commands here
              
              echo Before copying Contents in Build Artifact Directory; ls -R $(Build.ArtifactStagingDirectory)
        
        - task: CopyFiles@2
          inputs:
            SourceFolder: '$(System.DefaultWorkingDirectoty)/kube-manifests'
            Contents: '**'
            TargetFolder: '$(Build.ArtifactStagingDirectory)'

        - task: Bash@3
          inputs:
            targetType: 'inline'
            script: |
              # Write your commands here
              
              echo After copying to Build Artifact Directory; ls -R $(Build.ArtifactStagingDirectory)
        
        - task: PublishBuildArtifacts@1
          inputs:
            PathtoPublish: '$(Build.ArtifactStagingDirectory)'
            ArtifactName: 'kube-manifests'
            publishLocation: 'Container'




